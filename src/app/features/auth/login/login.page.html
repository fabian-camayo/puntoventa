<ion-content class="login-content" [fullscreen]="true">
  <div class="login-bg"></div>

  <div class="login-wrapper">
    <div class="login-brand">
      <div class="brand-icon">
        <ion-icon name="storefront-outline"></ion-icon>
      </div>
      <h1>PuntoVenta</h1>
      <p>{{ 'AUTH.LOGIN_SUBTITLE' | translate }}</p>
    </div>

    <div class="login-card">
      <h2>{{ 'AUTH.LOGIN_TITLE' | translate }}</h2>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="field-group">
          <label>{{ 'AUTH.USERNAME' | translate }}</label>
          <ion-item lines="none" class="field-item">
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-input
              formControlName="username"
              autocomplete="username"
              [placeholder]="'AUTH.USERNAME' | translate"
              (keydown.enter)="onSubmit()"
            ></ion-input>
          </ion-item>
        </div>

        <div class="field-group">
          <label>{{ 'AUTH.PASSWORD' | translate }}</label>
          <ion-item lines="none" class="field-item">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input
              type="password"
              formControlName="password"
              autocomplete="current-password"
              [placeholder]="'AUTH.PASSWORD' | translate"
              (keydown.enter)="onSubmit()"
            ></ion-input>
          </ion-item>
        </div>

        @if (errorMessage) {
          <div class="error-box">
            <ion-text color="danger">{{ errorMessage }}</ion-text>
          </div>
        }

        <ion-button
          expand="block"
          type="submit"
          class="login-button"
          [disabled]="form.invalid || loading"
        >
          @if (loading) {
            <ion-spinner name="crescent"></ion-spinner>
            <span class="loading-text">{{ 'AUTH.LOGGING_IN' | translate }}</span>
          } @else {
            <ion-icon name="log-in-outline" slot="start"></ion-icon>
            {{ 'AUTH.LOGIN' | translate }}
          }
        </ion-button>
      </form>
    </div>
  </div>
</ion-content>
