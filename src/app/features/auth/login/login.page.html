<ion-header>
  <ion-toolbar color="primary">
    <ion-title>{{ 'AUTH.LOGIN_TITLE' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="login-content">
  <div class="login-container">
    <ion-card class="login-card">
      <ion-card-header>
        <ion-card-title>PuntoVenta</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          <ion-item>
            <ion-label position="stacked">{{ 'AUTH.USERNAME' | translate }}</ion-label>
            <ion-input
              formControlName="username"
              autocomplete="username"
              (keydown.enter)="onSubmit()"
            ></ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="stacked">{{ 'AUTH.PASSWORD' | translate }}</ion-label>
            <ion-input
              type="password"
              formControlName="password"
              autocomplete="current-password"
              (keydown.enter)="onSubmit()"
            ></ion-input>
          </ion-item>

          @if (errorMessage) {
            <ion-text color="danger">
              <p class="error-text">{{ errorMessage }}</p>
            </ion-text>
          }

          <ion-button
            expand="block"
            type="submit"
            [disabled]="form.invalid || loading"
            class="login-button"
          >
            @if (loading) {
              <ion-spinner name="crescent"></ion-spinner>
            } @else {
              <ion-icon name="log-in-outline" slot="start"></ion-icon>
              {{ 'AUTH.LOGIN' | translate }}
            }
          </ion-button>
        </form>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
