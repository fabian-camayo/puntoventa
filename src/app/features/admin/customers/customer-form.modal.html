<ion-header class="modal-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button fill="clear" class="close-btn" (click)="dismiss()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>
      {{ (isEdit ? 'CUSTOMERS.EDIT_TITLE' : 'CUSTOMERS.NEW_TITLE') | translate }}
    </ion-title>
    <ion-buttons slot="end">
      <ion-button class="save-btn" (click)="save()" [disabled]="saving()">
        @if (saving()) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          <ion-icon name="checkmark-outline" slot="start"></ion-icon>
          {{ 'COMMON.SAVE' | translate }}
        }
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="modal-content">
  <form [formGroup]="form" class="form-layout">
    <section class="form-section">
      <div class="section-title">
        <ion-icon name="people-outline"></ion-icon>
        <span>{{ 'CUSTOMERS.SECTION_MAIN' | translate }}</span>
      </div>

      <div class="fields-grid">
        <div class="field-box">
          <label>{{ 'CUSTOMERS.CODE' | translate }}</label>
          <ion-item lines="none" class="field-item">
            <ion-input formControlName="code" [readonly]="isEdit" placeholder="PROV01"></ion-input>
          </ion-item>
          @if (!isEdit) {
            <small class="field-hint">{{ 'CUSTOMERS.CODE_HINT' | translate }}</small>
          }
        </div>

        <div class="field-box span-2">
          <label>{{ 'CUSTOMERS.NAME' | translate }}</label>
          <ion-item lines="none" class="field-item">
            <ion-input formControlName="name"></ion-input>
          </ion-item>
        </div>

        <div class="field-box">
          <label>{{ 'CUSTOMERS.TAX_ID' | translate }}</label>
          <ion-item lines="none" class="field-item">
            <ion-input formControlName="taxId"></ion-input>
          </ion-item>
        </div>

        <div class="field-box">
          <label>{{ 'CUSTOMERS.EMAIL' | translate }}</label>
          <ion-item lines="none" class="field-item">
            <ion-input type="email" formControlName="email"></ion-input>
          </ion-item>
        </div>

        <div class="field-box">
          <label>{{ 'CUSTOMERS.PHONE' | translate }}</label>
          <ion-item lines="none" class="field-item">
            <ion-input type="tel" formControlName="phone"></ion-input>
          </ion-item>
        </div>

        <div class="field-box">
          <label>{{ 'CUSTOMERS.CREDIT_LIMIT' | translate }}</label>
          <ion-item lines="none" class="field-item">
            <ion-input type="number" inputmode="decimal" formControlName="creditLimit"></ion-input>
          </ion-item>
        </div>

        <div class="field-box span-3">
          <label>{{ 'CUSTOMERS.ADDRESS' | translate }}</label>
          <ion-item lines="none" class="field-item">
            <ion-textarea formControlName="address" [autoGrow]="true" rows="2"></ion-textarea>
          </ion-item>
        </div>
      </div>

      @if (isEdit) {
        <div class="toggle-row">
          <ion-item lines="none" class="toggle-item">
            <ion-toggle formControlName="isActive" labelPlacement="start">
              {{ 'CUSTOMERS.ACTIVE' | translate }}
            </ion-toggle>
          </ion-item>
        </div>
      }
    </section>
  </form>
</ion-content>
