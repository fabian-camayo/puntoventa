<ion-header class="modal-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button fill="clear" class="close-btn" (click)="dismiss()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ 'POS.CASH_MOVEMENT' | translate }}</ion-title>
    <ion-buttons slot="end">
      <ion-button class="save-btn" (click)="save()" [disabled]="saving()">
        @if (saving()) {
          <ion-spinner name="crescent"></ion-spinner>
        } @else {
          <ion-icon name="checkmark-outline" slot="start"></ion-icon>
          {{ 'COMMON.SAVE' | translate }}
        }
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="modal-content">
  <form [formGroup]="form" class="form-layout">
    <section class="form-section">
      <div class="section-title">
        <ion-icon name="cash-outline"></ion-icon>
        <span>{{ 'POS.CASH_MOVEMENT' | translate }}</span>
      </div>

      <div class="fields-grid">
        <div class="field-box">
          <label>{{ 'POS.PAYMENT_TYPE' | translate }}</label>
          <ion-item lines="none" class="field-item">
            <ion-select formControlName="type" interface="popover">
              <ion-select-option value="WITHDRAWAL">{{ 'POS.CASH_WITHDRAWAL' | translate }}</ion-select-option>
              <ion-select-option value="DEPOSIT">{{ 'POS.CASH_DEPOSIT' | translate }}</ion-select-option>
            </ion-select>
          </ion-item>
        </div>

        <div class="field-box">
          <label>{{ 'POS.CASH_MOVEMENT_AMOUNT' | translate }}</label>
          <ion-item lines="none" class="field-item">
            <ion-input type="number" inputmode="decimal" formControlName="amount" min="0"></ion-input>
          </ion-item>
        </div>

        <div class="field-box span-2">
          <label>{{ 'POS.CASH_MOVEMENT_REASON' | translate }}</label>
          <ion-item lines="none" class="field-item">
            <ion-textarea formControlName="description" [autoGrow]="true" rows="2"></ion-textarea>
          </ion-item>
        </div>
      </div>
    </section>
  </form>
</ion-content>
