<div class="sale-tabs-bar">
  <div class="tabs-scroll">
    @for (tab of tabs; track tab.id) {
      <button
        class="tab-button"
        [class.active]="tab.id === activeTabId"
        (click)="onTabSelect(tab.id)"
      >
        <span class="tab-label">{{ tab.label }}</span>
        <span class="tab-total">{{ tab.total | appCurrency:'1.0-0' }}</span>
        @if (tab.itemCount > 0) {
          <span class="tab-badge">{{ tab.itemCount }}</span>
        }
        <ion-button
          fill="clear"
          size="small"
          class="tab-close"
          (click)="onTabClose(tab.id, $event)"
        >
          <ion-icon name="close-outline" slot="icon-only"></ion-icon>
        </ion-button>
      </button>
    }
  </div>
  <ion-button
    fill="clear"
    class="new-tab-btn"
    [disabled]="disableNewTab"
    (click)="newTab.emit()"
    title="Nueva venta (F1)"
  >
    <ion-icon name="add-outline" slot="icon-only"></ion-icon>
  </ion-button>
</div>
